    fallback_route: "改由 hp-matrix 直接 SSH 到各 Nest"
    risk_level: "medium"
    last_tested: "2026-05-22T14:33:00+08:00"
    test_result: "fail"
    notes: |
      ⚠️ Tailscale Shared Node 單向可視特性（by design，非 bug）：
      - Shared Node 只有被分享到的使用者網路可看見該節點。
      - 被 tag 的 Machine 本身看不到分享者網路的其他節點。
      即：hp-matrix (piziwei.wang@) 能看到 shrimp-nexus-01 (shrimpclan.ai@ shared)，
      但 shrimp-nexus-01 無法反向看到 piziwei.wang@ 下的 openclaw 節點。
      巢間互通方案：
      1. 將 openclaw 也加入 shrimpclan.ai@ tailnet，或
      2. 一律以 hp-matrix 作為跳板中繼（hp-matrix → Nest 1.0 / Nest 2.0 分別 SSH）。

